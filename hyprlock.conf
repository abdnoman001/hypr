# Automatically generated by toggle-theme.sh. Do not edit.

general {
    ignore_empty_input = true
    disable_loading_bar = true
    hide_cursor = true
}

background {
    monitor =
    path = /home/tamim/.config/waypaper/Wallpaper-Bank/wallpapers/Courtside-Sunset.png
    color = rgba(2e3440FF)
    blur_passes = 2
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.33 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(88c0d0FF)
    inner_color = rgba(2e3440EE)
    font_color = rgba(d8dee9FF)
    fade_on_empty = false
    placeholder_text = <span foreground="rgba(d8dee999)">Enter Password...</span>
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
}

# Time Label
label {
    monitor =
    text = $TIME
    color = rgba(d8dee9FF)
    font_size = 64
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 80
    halign = center
    valign = center
}

# Date Label
label {
    monitor =
    text = cmd[update:43200000] date +"%A, %d %B"
    color = rgba(88c0d0FF)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 20
    halign = center
    valign = center
}
